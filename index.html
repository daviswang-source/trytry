══════════════════════════════════════════════════════════════════ */

  {id:'cases',     label:'客戶案例'},

function addSection(type='custom') {
  const id = 'sec-' + Date.now();
  const tpl = SECTION_TYPES.find(t => t.id === type);
  state.sections.push({
    id, type,
    title: tpl ? tpl.label : '新區塊',
    desc: '請輸入此區塊的說明文字。',
  });
  refreshPreview(); renderPanel();
}

function removeSection(id) {
  if (state.sections.length <= 1) return;
  state.sections = state.sections.filter(s => s.id !== id);
  refreshPreview(); renderPanel();
}

function moveSectionUp(id) {
  const i = state.sections.findIndex(s => s.id === id);
  if (i <= 0) return;
  [state.sections[i-1], state.sections[i]] = [state.sections[i], state.sections[i-1]];
  refreshPreview(); renderPanel();
}

function moveSectionDown(id) {
  const i = state.sections.findIndex(s => s.id === id);
  if (i < 0 || i >= state.sections.length-1) return;
  [state.sections[i], state.sections[i+1]] = [state.sections[i+1], state.sections[i]];
  refreshPreview(); renderPanel();
}

function buildServicesHTML(styleClass, cardStyle, numStyle, numFn) {
  const ts = state.svcTitleSize||15, ds = state.svcDescSize||13;
  return state.services.map((svc,i) => {
    const num = numFn ? numFn(i) : (i+1);
    const imgHtml = svc.img ? `<img src="${svc.img}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:12px">` : '';
    return `<div class="svc ${styleClass}">${imgHtml}${numStyle ? `<div class="${numStyle}">${num}</div>` : ''}<h3 style="font-size:${ts}px">${svc.title}</h3><p style="font-size:${ds}px">${svc.desc}</p></div>`;
  }).join('');
}


function buildSectionContent(sec, styles) {
  const {cardCls='', tagCls='case-tag', titleCls='case-title', catCls='case-cat',
         featTitleCls='feat-title', featDescCls='feat-desc',
         svcCls='svc-card', svcNumCls='svc-num', svcNumFn=null,
         revCls='rev-card', revTextCls='rev-text', revNameCls='rev-name', starColor='#fbbf24',
         procCls='proc-card', procNumCls='proc-num', procTitleCls='proc-title', procDescCls='proc-desc',
         locCls='loc-card', locNameCls='loc-name', locAddrCls='loc-addr', locTelCls='loc-tel',
  } = styles || {};

  /* ── Image position wrapper (supports sec.imgs[] array) ── */
  function _wrapWithImg(content) {
    const imgs = (sec.imgs && sec.imgs.length > 0) ? sec.imgs : [];
    if(!imgs.length || sec.type==='banner') return content;
    const pos = sec.imgPosition||'top';
    // Build image strip: single = full, multiple = flex row
    const imgStrip = imgs.length === 1
      ? '<img src="'+imgs[0]+'" style="width:100%;max-height:220px;object-fit:cover;border-radius:10px;display:block">'
      : '<div style="display:flex;gap:8px">'+imgs.map(function(src){ return '<img src="'+src+'" style="flex:1;min-width:0;max-height:180px;object-fit:cover;border-radius:8px">'; }).join('')+'</div>';
    if(pos==='top')    return '<div style="margin-bottom:20px">'+imgStrip+'</div>'+content;
    if(pos==='bottom') return content+'<div style="margin-top:20px">'+imgStrip+'</div>';
    if(pos==='left')   return '<div style="display:flex;gap:20px;align-items:flex-start"><div style="flex:0 0 38%;min-width:0">'+imgStrip+'</div><div style="flex:1;min-width:0">'+content+'</div></div>';
    if(pos==='right')  return '<div style="display:flex;gap:20px;align-items:flex-start"><div style="flex:1;min-width:0">'+content+'</div><div style="flex:0 0 38%;min-width:0">'+imgStrip+'</div></div>';
    if(pos==='bg')     return '<div style="position:relative;border-radius:12px;overflow:hidden"><div style="position:absolute;inset:0;background:url('+imgs[0]+') center/cover;opacity:0.15;pointer-events:none"></div><div style="position:relative">'+content+'</div></div>';
    return content;
  }

  if (sec.type === 'cases') {
    const _caseLyt = (currentPageLayouts&&currentPageLayouts.cases)||'grid-3';
    const _caseCols = {'grid-3':'repeat(3,1fr)','grid-2':'repeat(2,1fr)','masonry':'repeat(auto-fill,minmax(240px,1fr))'}[_caseLyt]||'repeat(3,1fr)';
    return _wrapWithImg(buildCasesHTML(cardCls||'case-card', tagCls, titleCls, catCls, _caseCols));
  }
  if (sec.type === 'features') return _wrapWithImg(buildFeaturesHTML(cardCls||'feat-card', featTitleCls, featDescCls));
  if (sec.type === 'services') {
    const layoutMap = {
      'three-col':   {cols:'repeat(3,1fr)', gap:'18px'},
      'two-col':     {cols:'repeat(2,1fr)', gap:'24px'},
      'two-col-big': {cols:'repeat(2,1fr)', gap:'32px'},
      'masonry':     {cols:'repeat(auto-fill,minmax(260px,1fr))', gap:'20px'},
      'one-col':     {cols:'1fr', gap:'14px'},
    };
    const lyt = layoutMap[(currentPageLayouts&&currentPageLayouts.services)||currentServiceLayout] || layoutMap['three-col'];
    const cards = buildServicesHTML(svcCls, null, svcNumCls, svcNumFn);
    return _wrapWithImg(`<div style="display:grid;grid-template-columns:${lyt.cols};gap:${lyt.gap}">${cards}</div>`);
  }
  if (sec.type === 'reviews') {
    const _revLyt = (currentPageLayouts&&currentPageLayouts.reviews)||'grid-3';
    const _revCols = {'grid-3':'repeat(3,1fr)','grid-2':'repeat(2,1fr)','carousel':'repeat(2,1fr)'}[_revLyt]||'repeat(3,1fr)';
    return _wrapWithImg(buildReviewsHTML(cardCls||'rev-card', revTextCls, revNameCls, starColor, _revCols));
  }
  if (sec.type === 'process') {
    const _procLyt = (currentPageLayouts&&currentPageLayouts.process)||'horizontal';
    const _procCols = {'horizontal':'repeat(auto-fit,minmax(180px,1fr))','vertical':'1fr'}[_procLyt]||'repeat(auto-fit,minmax(180px,1fr))';
    return _wrapWithImg(buildProcessHTML(cardCls||'proc-card', procNumCls, procTitleCls, procDescCls, _procCols));
  }
  if (sec.type === 'locations') {
    const _locLyt = (currentPageLayouts&&currentPageLayouts.locations)||'grid-2';
    const _locCols = {'grid-2':'repeat(2,1fr)','list':'1fr'}[_locLyt]||'repeat(2,1fr)';
    return _wrapWithImg(buildLocationsHTML(cardCls||'loc-card', locNameCls, locAddrCls, locTelCls, _locCols));
  }
  if (sec.type === 'faq') return _wrapWithImg(buildFaqHTML(sec));
  if (sec.type === 'custom') return _wrapWithImg(`<p style="color:inherit;opacity:0.6;font-size:14px;line-height:1.8">${sec.customText||'（自訂文字區塊）'}</p>`);
  return _wrapWithImg('');
}

  state.colors=sc; currentLayout=sl; currentServiceLayout=ss; currentFont=sf;
}

function setIframeContent(frameId, html) {
  const frame = document.getElementById(frameId);
  if (!frame || !html) return;
  /* Try contentDocument.write first — identical to popup approach, works in file:// */
  try {
    const doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    if (doc) { doc.open(); doc.write(html); doc.close(); return; }
  } catch(e) { /* fall through */ }
  /* Blob URL fallback */
  try {
    const blob = new Blob([html], {type:'text/html;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const prev = frame._blobUrl;
    frame.src  = url;
    frame._blobUrl = url;
    if (prev) setTimeout(()=>{ try { URL.revokeObjectURL(prev); } catch(e){} }, 2000);
  } catch(e2) {
    try { frame.srcdoc = html; } catch(e3) { console.warn('iframe load failed:', e3); }
  }
}

function _buildNavInjectScript(activeLabel, frameId) {

    state.pages.forEach(function(p,i){ navSubs[i]=p.subItems||[]; });
  } else {
    Object.assign(navSubs, state.navSubItems||{});
  }
  const subData = JSON.stringify(navSubs);
  const items   = JSON.stringify(navItems);
  return `<script>
(function(){
  const NAV_SUBS=${subData};
  const NAV_ITEMS=${items};
  const FRAME_ID='${frameId}';

  /* ── Dropdown CSS ── */
  const css=document.createElement('style');
  css.textContent='.np-dd{display:none;position:absolute;top:100%;left:0;min-width:140px;z-index:9999;border-radius:6px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.2)}.np-dd a{display:block;padding:9px 14px;font-size:12px;white-space:nowrap}.np-parent{position:relative!important}';

    links.forEach(function(a){
      var txt=a.textContent.trim();
      var idx=NAV_ITEMS.indexOf(txt);
      if(idx<0) return;
      var subs=NAV_SUBS[idx];
      if(!subs||!subs.length) return;
      /* attach dropdown to <a> itself so it positions below that specific link */
      a.style.position='relative';
      a.style.display='inline-block';
      /* infer bg from body background */
      var bodyBg=window.getComputedStyle(document.body).backgroundColor||'rgba(0,0,0,0.85)';
      var ddBg=bodyBg==='rgba(0, 0, 0, 0)'?'rgba(20,20,30,0.95)':bodyBg;
      var dd=document.createElement('div');
      dd.className='np-dd';
      dd.style.background=ddBg;
      dd.innerHTML=subs.map(function(s){return '<a href="#" style="color:inherit;display:block;padding:9px 14px;font-size:12px;white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.08)">'+s+'</a>';}).join('');
      a.appendChild(dd);
      a.addEventListener('mouseenter',function(){ dd.style.display='block'; });
      a.addEventListener('mouseleave',function(){ dd.style.display='none'; });
    });
  }, 150);

  /* ── Hero image overlay (works across all styles) ── */
  var _heroImgSrc = ${JSON.stringify(state.heroImg||null)};
  var _heroImgOpacity = ${JSON.stringify(state.heroImgOpacity!=null?state.heroImgOpacity:0.35)};
  if(_heroImgSrc) {
    setTimeout(function(){
      var heroEl = document.querySelector('.hero,.hero-section,.banner,[class*="hero-"],[class*="banner-"],header');
      if(heroEl) {
        heroEl.style.position = 'relative';
        heroEl.style.overflow = 'hidden';
        var ov = document.createElement('div');
        ov.id = '__hero-img-ov';
        ov.style.cssText='position:absolute;inset:0;background:url('+_heroImgSrc+') center/cover no-repeat;opacity:'+_heroImgOpacity+';pointer-events:none;z-index:0';
        heroEl.insertBefore(ov, heroEl.firstChild);
        /* Lift all other children above the overlay so text is never obscured */
        Array.from(heroEl.children).forEach(function(child){
          if(child !== ov) {
            if(!child.style.position || child.style.position === 'static') child.style.position = 'relative';
            if(!child.style.zIndex || parseInt(child.style.zIndex) < 1) child.style.zIndex = '1';
          }
        });
      }
    }, 80);
  }

  /* ── CTA Buttons update ── */
  var _ctaBtns = ${JSON.stringify(state.ctaButtons||[])};
  if(_ctaBtns.length > 0) {
    setTimeout(function(){
      var heroEl = document.querySelector('.hero,.hero-section,.banner,[class*="hero-"],[class*="banner-"],header');
      if(!heroEl) return;
      var btns = Array.from(heroEl.querySelectorAll('a')).filter(function(a){ return a.className.indexOf('btn')>=0; });
      btns.forEach(function(btn,i){
        if(i < _ctaBtns.length) {
          btn.textContent = _ctaBtns[i].text;
          btn.style.display = _ctaBtns[i].on ? '' : 'none';
        } else {
          btn.style.display='none';
        }
      });
      if(_ctaBtns.length > btns.length && btns.length > 0) {
        var btnContainer = btns[0].parentElement;
        for(var j=btns.length; j<_ctaBtns.length; j++) {
          if(_ctaBtns[j].on) {
            var newBtn = document.createElement('a');
            newBtn.href='#';
            newBtn.className = btns[0].className;

  /* ── Contact block: visibility + position reorder ── */
  var _pageBlockIds = ${JSON.stringify(state._pageBlockIds || null)};
  if(_pageBlockIds !== null) {
    setTimeout(function(){
      var ctaEl = document.querySelector('.cta-sec');
      if(!ctaEl) return;
      if(!_pageBlockIds.includes('contact')) {

      ctaEl.style.display = '';
      /* Reorder: move ctaEl to correct position relative to .section divs */
      var container = ctaEl.parentElement;
      if(!container) return;
      var sectionEls = Array.from(container.querySelectorAll('.section'));
      /* Which section-type blockIds come AFTER contact in pageBlockIds? */
      var sectionBlockIds = ['services','cases','reviews','process','locations','features','faq'];
      var contactIdx = _pageBlockIds.indexOf('contact');
      var afterContactSectionBids = _pageBlockIds.slice(contactIdx+1).filter(function(b){ return sectionBlockIds.includes(b); });

        var insertBeforeEl = sectionEls[sectionEls.length - afterContactSectionBids.length];

        container.appendChild(ctaEl);
      }
    }, 85);
  }

  /* ── Intercept all link clicks ── */
  document.addEventListener('click',function(e){
    var a=e.target.closest('a,button');
    if(!a) return;
    var href=a.getAttribute('href')||'';
    if(href.startsWith('http')||href.startsWith('mailto')) return;
    e.preventDefault();
    var txt=a.textContent.trim();
    if(txt) window.parent.postMessage({type:'navClick',label:txt,frameId:FRAME_ID},'*');
  });
})();
<\/script>`;
}

function refreshPreview() {
  const s = styles[currentStyle];
  try {
    /* ── Sync layout globals from active page ── */
    const ap = state.activePage||0;
    const page = (state.pages&&state.pages[ap]) || null;
    const pLayouts = page ? (page.layouts||{}) : (state.blockLayouts||{});
    currentLayout = pLayouts.banner || currentLayout || 'hero-center';
    currentServiceLayout = pLayouts.services || currentServiceLayout || 'three-col';
    currentPageLayouts = Object.assign({}, pLayouts);

    /* ── Temporarily filter state.sections to current page's blocks ── */
    const BLOCK_TYPE_MAP = {services:['services'],cases:['cases'],reviews:['reviews'],process:['process'],locations:['locations'],features:['features'],faq:['faq']};
    const savedSections  = state.sections;
    const savedNavItems  = state.navItems;
    const savedNavSubs   = state.navSubItems;
    const savedHero      = state.hero;
    const savedSub       = state.sub;

    if(page && page.blockIds) {
      /* Filter AND reorder sections to match page.blockIds order */
      const orderedTypes = (page.blockIds||[]).filter(bid=>BLOCK_TYPE_MAP[bid]).flatMap(bid=>BLOCK_TYPE_MAP[bid]);
      state.sections = orderedTypes.map(type=>(savedSections||[]).find(sec=>sec.type===type)).filter(Boolean);
    }
    /* Sync nav from pages */
    if(state.pages) {
      state.navItems = state.pages.map(p=>p.navItem||'');
      state.navSubItems = {};
      state.pages.forEach((p,i)=>{ state.navSubItems[i]=p.subItems||[]; });
    }
    /* Sync banner hero/sub from active page */
    if(page && page.hero != null) state.hero = page.hero;
    if(page && page.sub  != null) state.sub  = page.sub;

    let pageHtml = s.render();

    /* Inject lang switcher into nav for multilang/cart plans */
    if (state.langSwitch) {
      const _lsBtn = state.langSwitch === 'text'
        ? `<button onclick="return false" style="margin-left:16px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:20px;padding:4px 14px;color:inherit;cursor:pointer;font-size:12px;letter-spacing:0.08em;font-family:inherit;flex-shrink:0">中 / EN</button>`
        : `<button onclick="return false" style="margin-left:16px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.35);border-radius:50%;width:34px;height:34px;color:inherit;cursor:pointer;font-size:18px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">🌐</button>`;
      pageHtml = pageHtml.replace('</nav>', _lsBtn + '</nav>');
    }

    /* Restore */
    state.sections   = savedSections;
    state.navItems   = savedNavItems;
    state.navSubItems= savedNavSubs;
    state.hero       = savedHero;
    state.sub        = savedSub;

    const _firstNavItem = (state.pages && state.pages[state.activePage||0] && state.pages[state.activePage||0].navItem) || '';
    state._pageBlockIds = (page && page.blockIds) || [];
    pageHtml = pageHtml.replace('</body>', _buildNavInjectScript(_firstNavItem, 'editor-frame') + '</body>');
    state._pageBlockIds = null;
    const frame = document.getElementById('editor-frame');
    if (frame) setIframeContent('editor-frame', pageHtml);
    else setTimeout(()=>{ refreshPreview(); }, 100);
  } catch(e) { console.warn('refresh error:', e); }
}

/* ── Global message handler for both preview + editor frames ── */
window.removeEventListener && window.removeEventListener('message', window._npMsgHandler);

function showSubPagePreview(label, frameId) {
  if(!frameId) frameId = 'editor-frame';
  const sk = (frameId === 'prev-frame') ? currentPreviewStyle : currentStyle;
  const s  = styles[sk];
  if(!s) return;

  /* ── Find which page this nav label belongs to ── */
  const pages = state.pages || [];
  let pageIdx = pages.findIndex(p => p.navItem === label);
  if(pageIdx < 0) pageIdx = 0;
  const page = pages[pageIdx] || {blockIds:[], layouts:{}};
  const pLayouts = page.layouts || {};

  /* ── If clicking the currently-active page in editor, just refresh ── */
  if(frameId === 'editor-frame' && pageIdx === (state.activePage||0)) {
    refreshPreview();
    return;
  }

  /* ── Save global state ── */
  const savedColors     = Object.assign({}, state.colors);
  const savedSections   = state.sections;
  const savedNavItems   = state.navItems;
  const savedNavSubs    = state.navSubItems;
  const savedHero       = state.hero;
  const savedSub        = state.sub;
  const savedLayout     = currentLayout;
  const savedSvcLayout  = currentServiceLayout;

  /* ── Apply this page's style colors (use custom colors in editor, style defaults in gallery) ── */
  const useCustom = (frameId === 'editor-frame');
  if(!useCustom) {
    state.colors = {primary:s.primary, bg:s.bg, accent:s.accent,
                    text:s.text||'#f8fafc', textSoft:s.textSoft||'rgba(248,250,252,0.7)'};
  }

  /* ── Apply this page's layout ── */
  currentLayout        = pLayouts.banner   || 'hero-center';
  currentServiceLayout = pLayouts.services || 'three-col';
  currentPageLayouts   = Object.assign({}, pLayouts);

  /* ── Filter sections to this page's blockIds ── */
  const BLOCK_TYPE_MAP = {services:['services'],cases:['cases'],reviews:['reviews'],
                          process:['process'],locations:['locations'],features:['features'],faq:['faq']};
  if(page.blockIds && page.blockIds.length) {
    /* Filter AND reorder sections to match page.blockIds order */
    const orderedTypes = page.blockIds.filter(bid=>BLOCK_TYPE_MAP[bid]).flatMap(bid=>BLOCK_TYPE_MAP[bid]);
    state.sections = orderedTypes.map(type=>(savedSections||[]).find(sec=>sec.type===type)).filter(Boolean);
  } else {
    state.sections = savedSections;
  }

  /* ── Sync nav from all pages ── */
  state.navItems  = pages.map(p => p.navItem||'');
  state.navSubItems = {};
  pages.forEach((p,i) => { state.navSubItems[i] = p.subItems||[]; });

  /* ── Sync banner hero/sub from this page ── */
  if(page.hero != null) state.hero = page.hero;
  if(page.sub  != null) state.sub  = page.sub;

  /* ── Render the actual style ── */
  let pageHtml;
  try { pageHtml = s.render(); }
  catch(e) { console.warn('showSubPagePreview render error:', e); pageHtml = '<p>渲染錯誤</p>'; }

  /* ── Restore global state ── */
  state.sections    = savedSections;
  state.navItems    = savedNavItems;
  state.navSubItems = savedNavSubs;
  state.hero        = savedHero;
  state.sub         = savedSub;
  if(!useCustom) state.colors = savedColors;
  currentLayout        = savedLayout;
  currentServiceLayout = savedSvcLayout;
  currentPageLayouts   = {};

  /* ── Inject nav intercept script ── */
  state._pageBlockIds = page.blockIds || [];
  pageHtml = pageHtml.replace('</body>', _buildNavInjectScript(label, frameId) + '</body>');
  state._pageBlockIds = null;
  setIframeContent(frameId, pageHtml);
}


function renderPanel() {
  const body=document.getElementById('panel-body');
  if(!body) return;
  renderNewPanel(body);
}

// ── Accordion helper ──────────────────────────────────────────────
function accordion(id, label, sub, html, openByDefault=false) {
  return `<div class="accordion" id="acc-${id}">
    <div class="accordion-head${openByDefault?' open':''}" onclick="toggleAccordion('${id}')">
      <span><span class="accordion-label">${label}</span><span class="accordion-sub">${sub}</span></span>
      <span class="accordion-arrow">▼</span>
    </div>
    <div class="accordion-body${openByDefault?' open':''}">${html}</div>
  </div>`;
}
function toggleAccordion(id) {
  const head = document.querySelector(`#acc-${id} .accordion-head`);
  const body = document.querySelector(`#acc-${id} .accordion-body`);
  head.classList.toggle('open');
  body.classList.toggle('open');
}

function ensurePages() {
  if(!state.pages || !state.pages.length) {
    state.pages=[
      {navItem:'服務介紹',hero:'高質感品牌網站設計',sub:'讓品牌說話，用設計開拓商機。默聲創意為您打造專屬的數位形象。',subItems:[],blockIds:['banner','services','cases'],layouts:{banner:'hero-center',services:'three-col',cases:'grid-3'}},
      {navItem:'作品案例',hero:'精選設計案例',sub:'超過百間企業合作經驗，用作品說話。',subItems:[],blockIds:['banner','cases','reviews'],layouts:{banner:'hero-center',cases:'grid-3'}},
      {navItem:'關於我們',hero:'關於默聲創意',sub:'我們相信好的設計能改變品牌的命運，為每位客戶創造獨特的數位價值。',subItems:[],blockIds:['banner','reviews','process'],layouts:{banner:'hero-center',process:'horizontal'}},
      {navItem:'聯絡我們',hero:'與我們聯繫',sub:'準備好開始您的品牌之旅了嗎？立即聯絡我們的設計顧問。',subItems:[],blockIds:['banner','contact','locations'],layouts:{banner:'hero-center',contact:'simple',locations:'grid-2'}},
    ];
  }
  /* Migrate old pages that don't have hero/sub yet */
  state.pages.forEach(function(p,i){
    if(p.hero==null) p.hero = state.hero||'';
    if(p.sub ==null) p.sub  = state.sub ||'';
  });
  if(state.activePage===undefined) state.activePage=0;
  if(state.activePage>=state.pages.length) state.activePage=state.pages.length-1;
}

function setActivePage(idx) {
  ensurePages();
  state.activePage=idx;
  renderPanel();
  refreshPreview();
}

function addPage() {
  ensurePages();
  if(state.pages.length>=5) return;
  state.pages.push({navItem:'新頁面'+(state.pages.length+1),hero:'頁面標題',sub:'請輸入此頁的說明文字。',subItems:[],blockIds:['banner'],layouts:{banner:'hero-center'}});
  state.activePage=state.pages.length-1;
  renderPanel(); refreshPreview();
}

function removePage(idx) {
  ensurePages();
  if(state.pages.length<=2) { alert('至少需要 2 個頁面'); return; }
  state.pages.splice(idx,1);
  if(state.activePage>=state.pages.length) state.activePage=state.pages.length-1;
  renderPanel(); refreshPreview();
}

function movePageLeft(idx) {
  ensurePages();
  if(idx===0) return;
  [state.pages[idx-1],state.pages[idx]]=[state.pages[idx],state.pages[idx-1]];
  state.activePage=idx-1;
  renderPanel(); refreshPreview();
}

function movePageRight(idx) {
  ensurePages();
  if(idx>=state.pages.length-1) return;
  [state.pages[idx],state.pages[idx+1]]=[state.pages[idx+1],state.pages[idx]];
  state.activePage=idx+1;
  renderPanel(); refreshPreview();
}

function setPageName(idx, val) {
  ensurePages();
  if(state.pages[idx]) state.pages[idx].navItem=val;
  /* Update tab label live */
  const tab = document.querySelector(`.np-tab[data-idx="${idx}"] .np-tab-name`);
  if(tab) tab.textContent=val||'（未命名）';
  refreshPreview();
}

function togglePageBlock(pIdx, blockId) {
  ensurePages();
  const p=state.pages[pIdx];
  if(!p) return;
  if(!p.blockIds) p.blockIds=[];
  const i=p.blockIds.indexOf(blockId);
  if(i>=0) p.blockIds.splice(i,1);
  else p.blockIds.push(blockId);
  renderPanel(); refreshPreview();
}

function movePageBlock(pIdx, blockIdx, dir) {
  ensurePages();
  const p=state.pages[pIdx];
  if(!p||!p.blockIds) return;
  const ni=blockIdx+dir;
  if(ni<0||ni>=p.blockIds.length) return;
  [p.blockIds[blockIdx],p.blockIds[ni]]=[p.blockIds[ni],p.blockIds[blockIdx]];
  renderPanel(); refreshPreview();
}

function setPageLayout(pIdx, blockId, layoutId) {
  ensurePages();
  const p=state.pages[pIdx];
  if(!p) return;
  if(!p.layouts) p.layouts={};

}

// ── Drag state ───────────────────────────────────────────────────
let _dragFromIdx = -1;
let _dragPageIdx = -1;

function onBlockDragStart(e, pIdx, fromIdx) {
  _dragFromIdx = fromIdx; _dragPageIdx = pIdx;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.4';
}
function onBlockDragEnd(e) { e.currentTarget.style.opacity = ''; }
function onBlockDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function onBlockDrop(e, pIdx, toIdx) {
  e.preventDefault();
  if(_dragFromIdx < 0 || _dragFromIdx === toIdx || _dragPageIdx !== pIdx) return;
  ensurePages();
  const p = state.pages[pIdx];
  const bid = p.blockIds.splice(_dragFromIdx, 1)[0];
  p.blockIds.splice(toIdx, 0, bid);
  _dragFromIdx = -1; _dragPageIdx = -1;
  renderPanel(); setTimeout(refreshPreview, 0);
}
function onBlockDragEnter(e) {
  e.preventDefault();
  e.currentTarget.style.borderColor = '#c17f4a';
}
function onBlockDragLeave(e) { e.currentTarget.style.borderColor = ''; }

// ── Block ↔ section/state mapping ───────────────────────────────
const BLOCK_TO_STATE = {
  banner:    {stateKey:'hero',     titleKey:'hero',    descKey:'sub',    field:'hero'},
  services:  {sectionType:'services'},
  cases:     {sectionType:'cases'},
  reviews:   {sectionType:'reviews'},
  process:   {sectionType:'process'},
  locations: {sectionType:'locations'},
  contact:   {titleKey:'contactTitle', descKey:'contactDesc'},
  faq:       {sectionType:'faq'},
};

function getBlockSection(blockId) {
  if(!state.sections) return null;
  const map = BLOCK_TO_STATE[blockId];
  if(!map || !map.sectionType) return null;
  return state.sections.find(s => s.type === map.sectionType) || null;
}

function setBlockTitle(blockId, val) {
  if(blockId === 'banner') {
    state.hero = val;
    const ap = state.activePage||0;
    if(state.pages && state.pages[ap]) state.pages[ap].hero = val;
  } else if(blockId === 'contact') { state.contactTitle = val; }
  else { const sec = getBlockSection(blockId); if(sec) sec.title = val; }
  refreshPreview();
}
function setBlockDesc(blockId, val) {
  if(blockId === 'banner') {
    state.sub = val;
    const ap = state.activePage||0;
    if(state.pages && state.pages[ap]) state.pages[ap].sub = val;
  } else if(blockId === 'contact') { state.contactDesc = val; }
  else { const sec = getBlockSection(blockId); if(sec) sec.desc = val; }
  refreshPreview();
}

function handleBlockImg(blockId, input) {
  if(!input.files || !input.files.length) return;
  if(blockId === 'banner') {
    // Banner: single image via existing heroImg
    const reader = new FileReader();
    reader.onload = function(e) { state.heroImg = e.target.result; refreshPreview(); renderPanel(); };
    reader.readAsDataURL(input.files[0]);
    return;
  }
  // Non-banner: append all selected files to sec.imgs[]
  const sec = getBlockSection(blockId);
  if(!sec) return;
  if(!sec.imgs) sec.imgs = [];
  let loaded = 0;
  const total = input.files.length;
  Array.from(input.files).forEach(function(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      sec.imgs.push(e.target.result);
      loaded++;
      if(loaded === total) { refreshPreview(); renderPanel(); }
    };
    reader.readAsDataURL(file);
  });
}
function removeBlockImg(blockId, idx) {
  if(blockId === 'banner') { state.heroImg = null; refreshPreview(); renderPanel(); return; }
  const sec = getBlockSection(blockId);
  if(!sec) return;
  if(idx != null && sec.imgs) {
    sec.imgs.splice(idx, 1);
  } else {
    sec.imgs = [];
  }
  refreshPreview(); renderPanel();
}

  else if(blockId==='process') state.process.splice(idx,1);
  else if(blockId==='reviews') state.reviews.splice(idx,1);
  else if(blockId==='features') state.features.splice(idx,1);
  else if(blockId==='locations') state.locations.splice(idx,1);
  else if(blockId==='faq'){ const f=_getFaqItems(); if(f) f.splice(idx,1); }
  refreshPreview(); renderPanel();
}
function updateBlockItem(blockId, idx, field, val) {
  let arr=null;
  if(blockId==='services')   arr=state.services;
  else if(blockId==='cases') arr=state.cases;
  else if(blockId==='process') arr=state.process;
  else if(blockId==='reviews') arr=state.reviews;
  else if(blockId==='features') arr=state.features;
  else if(blockId==='locations') arr=state.locations;
  else if(blockId==='faq') arr=_getFaqItems();
  if(arr&&arr[idx]!=null){ arr[idx][field]=val; refreshPreview(); }
}
function moveBlockItem(blockId, idx, dir) {
  let arr=null;
  if(blockId==='services')   arr=state.services;
  else if(blockId==='cases') arr=state.cases;
  else if(blockId==='process') arr=state.process;
  else if(blockId==='reviews') arr=state.reviews;
  else if(blockId==='features') arr=state.features;
  else if(blockId==='locations') arr=state.locations;
  else if(blockId==='faq') arr=_getFaqItems();
  if(!arr) return;
  const ni=idx+dir;
  if(ni<0||ni>=arr.length) return;
  [arr[idx],arr[ni]]=[arr[ni],arr[idx]];
  refreshPreview(); renderPanel();
}
function buildItemsEditor(blockId) {
  const noItems = ['banner','contact'];
  if(noItems.includes(blockId)) return '';
  const cfl = getCasesFieldLabels();
  let items=[], fields=[], addLabel='＋ 新增項目';
  if(blockId==='services'){
    items=state.services||[]; addLabel='＋ 新增服務';
    fields=[{k:'title',l:'名稱',m:false},{k:'desc',l:'說明',m:true}];
  } else if(blockId==='cases'){
    items=state.cases||[]; addLabel='＋ 新增項目';
    fields=[{k:'name',l:cfl.f1,m:false},{k:'tag',l:cfl.f2,m:false},{k:'cat',l:cfl.f3,m:false}];
  } else if(blockId==='process'){
    items=state.process||[]; addLabel='＋ 新增步驟';
    fields=[{k:'num',l:'步驟標籤',m:false},{k:'title',l:'標題',m:false},{k:'desc',l:'說明',m:true}];
  } else if(blockId==='reviews'){
    items=state.reviews||[]; addLabel='＋ 新增評價';
    fields=[{k:'name',l:'姓名',m:false},{k:'text',l:'評語',m:true}];
  } else if(blockId==='features'){
    items=state.features||[]; addLabel='＋ 新增特色';
    fields=[{k:'title',l:'標題',m:false},{k:'desc',l:'說明',m:true}];
  } else if(blockId==='locations'){
    items=state.locations||[]; addLabel='＋ 新增據點';
    fields=[{k:'city',l:'城市名稱',m:false},{k:'addr',l:'地址',m:false},{k:'tel',l:'電話',m:false}];
  } else if(blockId==='faq'){
    items=_getFaqItems()||[]; addLabel='＋ 新增問題';
    fields=[{k:'q',l:'問題',m:false},{k:'a',l:'回答',m:true}];
  } else { return ''; }

  const rows = items.map((item,i) => {
    const fHtml = fields.map(f => {
      const raw = (item[f.k]||'').toString();
      const escAttr = raw.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      const escTxt  = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;');
      const el = f.m
        ? `<textarea class="form-input" style="font-size:12px;padding:5px 8px;height:50px;resize:vertical;width:100%;box-sizing:border-box" oninput="updateBlockItem('${blockId}',${i},'${f.k}',this.value)" placeholder="${f.l}">${escTxt}</textarea>`
        : `<input class="form-input" value="${escAttr}" style="font-size:12px;padding:5px 8px" oninput="updateBlockItem('${blockId}',${i},'${f.k}',this.value)" placeholder="${f.l}">`;
      return `<div style="margin-bottom:4px"><div style="font-size:10px;color:#aaa;margin-bottom:2px">${f.l}</div>${el}</div>`;
    }).join('');
    const disUp = i===0 ? 'opacity:.35;pointer-events:none' : '';
    const disDn = i===items.length-1 ? 'opacity:.35;pointer-events:none' : '';
    return `<div style="background:#fff;border:1px solid #dedad2;border-radius:7px;padding:10px 10px 6px;margin-bottom:7px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div style="font-size:10px;font-weight:600;color:#aaa;letter-spacing:.03em">項目 ${i+1}</div>
        <div style="display:flex;gap:4px;align-items:center">
          <button onclick="moveBlockItem('${blockId}',${i},-1)" style="font-size:11px;color:#888;background:none;border:1px solid #ddd;border-radius:4px;padding:1px 6px;cursor:pointer;${disUp}">↑</button>
          <button onclick="moveBlockItem('${blockId}',${i},1)"  style="font-size:11px;color:#888;background:none;border:1px solid #ddd;border-radius:4px;padding:1px 6px;cursor:pointer;${disDn}">↓</button>
          <button onclick="removeBlockItem('${blockId}',${i})"  style="font-size:11px;color:#c44;background:none;border:1px solid #f5c6c6;border-radius:4px;padding:1px 8px;cursor:pointer">✕</button>
        </div>
      </div>
      ${fHtml}
    </div>`;
  }).join('');

  return `<div style="margin-top:12px;border-top:1px dashed #e0ddd6;padding-top:10px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:11px;font-weight:600;color:#777">項目管理</div>
      <button onclick="addBlockItem('${blockId}')" style="font-size:11px;color:#c17f4a;background:none;border:1px solid #c17f4a;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:inherit">${addLabel}</button>
    </div>
    ${rows || '<div style="font-size:12px;color:#bbb;text-align:center;padding:10px 0">尚無項目，點擊上方按鈕新增</div>'}
  </div>`;
}

    const sec = getBlockSection(blockId);
    if(sec) { titleVal = sec.title||''; descVal = sec.desc||''; secImgs = sec.imgs||[]; imgVal = secImgs.length > 0 ? secImgs[0] : null; }

        <div style="font-size:11px;color:#888">CTA 按鈕</div>

      </div>

    const _posbtns = _posOpts.map(o => {
      const active = _pos === o.id;

  const imgSection = noImgBlocks.includes(blockId) ? '' : `

      ${thumbsHtml}${uploadBtn}

      <div style="font-size:11px;color:#888;margin-bottom:4px">標題</div>

        </div>
        ${on?`<button onclick="toggleBlockEdit('${editKey}')"

  const blockSection = `

      ${allBlocksHtml}

  /* Layout options — follow same drag order as enabled blocks */
  const layoutRows = _enabledBlocks.map(b=>b.id).filter(bid=>PAGE_LAYOUTS[bid]).map(bid=>{
    const lo = PAGE_LAYOUTS[bid];
    const cur = (page.layouts&&page.layouts[bid]) || lo.opts[0].id;
    const optsHtml = lo.opts.map(opt=>`
      <div class="layout-thumb${opt.id===cur?' sel':''}" onclick="setPageLayout(${ap},'${bid}','${opt.id}')" title="${opt.name}">

    return `<div style="margin-bottom:14px">

  }).join('');

  const layoutSection = layoutRows ? `
    <div class="np-section">
      <div class="np-section-title">版面排列</div>
      ${layoutRows}
    </div>` : '';

  const pageEditorContent =
    `<div class="np-divider"></div>` +
    tabBar +
    `<div class="np-page-area">` +
      pageHeader + subSection + blockSection + layoutSection +
    `</div>`;

  const industryContent =
    `<div class="np-divider"></div>` +
    renderIndustryPanel();

  /* Lang switch panel — only for multilang/cart plans */
  const langSwitchPanel = (state.langSwitch !== null && state.langSwitch !== undefined) ? `
    <div style="margin:10px 0 0;padding:12px 16px;background:#f8f7f4;border-radius:10px;border:1.5px solid #e8e5de">
      <div style="font-size:12px;font-weight:700;color:#555;margin-bottom:8px;letter-spacing:0.05em">🌐 語系切換樣式</div>
      <div style="display:flex;gap:8px">
        <button onclick="state.langSwitch='globe';refreshPreview();renderPanel()"

          style="flex:1;padding:8px;border-radius:8px;border:2px solid ${state.langSwitch==='text'?'#3b6fe8':'#ddd'};background:${state.langSwitch==='text'?'#eff4ff':'#fff'};cursor:pointer;font-size:13px;color:${state.langSwitch==='text'?'#3b6fe8':'#666'}">
          中/EN<br><span style="font-size:11px">文字樣式</span>
        </button>
      </div>
      <div style="font-size:11px;color:#aaa;margin-top:6px">切換樣式會即時反映在左側預覽</div>

  body.innerHTML =

/* ─── Industry panel renderer ────────────────────────────────── */
function renderIndustryPanel() {
  const cards = Object.entries(INDUSTRY_TEMPLATES).map(([key, tmpl])=>{
    const isApplied = _appliedIndustry === key;
    return `<div class="industry-card${isApplied?' applied':''}" onclick="applyIndustryTemplate('${key}')">
      <div class="industry-icon">${tmpl.icon}</div>
      <div class="industry-name">${tmpl.name}</div>
      <div class="industry-desc">${tmpl.desc}</div>
      ${isApplied ? `<div class="industry-applied-badge">✓ 已套用</div>` : ''}
    </div>`;
  }).join('');
  return `
    <div class="np-section">
      <div class="np-hint" style="margin-bottom:12px">選擇最接近客戶行業的模板，自動套用頁面結構與 Banner 文字，再依需求調整。</div>
      <div class="industry-grid">${cards}</div>
    </div>`;
}

function applyIndustryTemplate(key) {
  const tmpl = INDUSTRY_TEMPLATES[key];
  if(!tmpl) return;
  /* Deep-clone the template pages so edits don't pollute the template */
  state.pages = JSON.parse(JSON.stringify(tmpl.pages));
  state.activePage = 0;
  _appliedIndustry = key;
  _panelMode = 'pages'; /* Switch back to page editor after applying */

  /* Apply industry content (sections, services, cases, reviews) if defined */
  if(tmpl.content) {
    const c = tmpl.content;
    if(c.sections)      state.sections      = JSON.parse(JSON.stringify(c.sections));
    if(c.services)      state.services      = JSON.parse(JSON.stringify(c.services));
    if(c.casesTitle)    state.casesTitle     = c.casesTitle;
    if(c.casesDesc)     state.casesDesc      = c.casesDesc;
    if(c.cases)         state.cases          = JSON.parse(JSON.stringify(c.cases));
    if(c.reviewsTitle)  state.reviewsTitle   = c.reviewsTitle;
    if(c.reviewsDesc)   state.reviewsDesc    = c.reviewsDesc;
    if(c.reviews)       state.reviews        = JSON.parse(JSON.stringify(c.reviews));
    if(c.contactTitle)   state.contactTitle   = c.contactTitle;
    if(c.contactDesc)    state.contactDesc    = c.contactDesc;
    if(c.contactCta)     state.contactCta     = c.contactCta;
    if(c.processTitle)   state.processTitle   = c.processTitle;
    if(c.processDesc)    state.processDesc    = c.processDesc;
    if(c.process)        state.process        = JSON.parse(JSON.stringify(c.process));
    /* Also sync section titles/descs to the top-level state fields for sections that render from them */
    const secCases = state.sections.find(s=>s.type==='cases');
    if(secCases){ state.casesTitle = secCases.title; state.casesDesc = secCases.desc; }
    const secReviews = state.sections.find(s=>s.type==='reviews');
    if(secReviews){ state.reviewsTitle = secReviews.title; state.reviewsDesc = secReviews.desc; }
    const secProcess = state.sections.find(s=>s.type==='process');
    if(secProcess){ state.processTitle = secProcess.title; state.processDesc = secProcess.desc; }
  }

  renderPanel();
  refreshPreview();
}

function switchPanelMode(mode) {
  _panelMode = mode;
  renderPanel();
}

function submitDesign() {
  /* ─── Lookup tables ─── */
  const BLOCK_LABEL = {};
  PAGE_BLOCKS.forEach(b=>{ BLOCK_LABEL[b.id]=b.label; });
  const LAYOUT_NAME = {};
  Object.entries(PAGE_LAYOUTS).forEach(([bid,cfg])=>{

      return `<div class="block-row"><span class="block-dot">▪</span><span class="block-name">${label}</span>${ln?`<span class="block-layout">${ln}</span>`:''}</div>${ctaRow}`;
    }).join('');

  }).join('');

  const styleName = styleDisplayNames[currentStyle]||currentStyle;

  /* ─── Brief HTML block (reused in both confirmation and receipt views) ─── */
  const briefBodyHtml = `
    <div class="sec-block">

  /* ─── Render ALL pages HTML for preview download ─── */
  let previewHtml = '';
  try {
    const s2 = styles[currentStyle];

        let pageHtmlForExport = s2.render();

            'var idx=N.indexOf(txt);' +
            'if(idx>=0){e.preventDefault();try{window.parent.postMessage({type:"navClick",idx:idx},"*");}catch(ex){}}' +

/* ── Shared download helper ── */
function _downloadBlob(content, filename) {
  try {
    const blob = new Blob([content], {type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>{ URL.revokeObjectURL(url); }, 2000);
    return true;
  } catch(e) { console.warn('download failed:', e); return false; }
}

/* ── Build multi-page preview HTML wrapper ── */
function _buildPreviewHtml(pages, names, brand) {
  const escapedBrand = (brand||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 每一頁加入頁內切換腳本（透過 postMessage 通知外層）
  const pagesWithNav = pages.map(function(pageHtml) {
    const navScript = '<script>(function(){' +
      'var N=' + JSON.stringify(names) + ';' +
      'document.addEventListener("click",function(e){' +
        'var el=e.target.closest("a,button");' +
        'if(!el)return;' +
        'var href=(el.getAttribute("href")||"").trim();' +
        'if(href&&href!="#"&&!href.startsWith("#"))return;' + // 有真實 href 的讓它自然運作
        'var txt=el.textContent.trim();' +
        'var idx=N.indexOf(txt);' +
        'if(idx>=0){e.preventDefault();window.parent.postMessage({type:"navClick",idx:idx},"*");}' +
        // 子選單項目：不在 N 裡 → 不攔截，讓它自然 preventDefault 就好（頁內無真實連結）
      '});' +
    '})();<\/script>';
    return pageHtml.replace('</body>', navScript + '</body>');
  });

  const pagesJson = JSON.stringify(pagesWithNav);
  const namesJson = JSON.stringify(names);

  return '<!DOCTYPE html>\n' +
'<html lang="zh-TW"><head>\n' +
'<meta charset="UTF-8">\n' +
'<meta name="viewport" content="width=device-width,initial-scale=1">\n' +
'<title>' + escapedBrand + ' \u00b7 \u7db2\u7ad9\u8a2d\u8a08\u9810\u89bd</title>\n' +
'<style>\n' +
'*{box-sizing:border-box;margin:0;padding:0}\n' +
'html,body{height:100%;overflow:hidden}\n' +
'#tnav{background:#1a1a18;padding:0 20px;height:50px;display:flex;align-items:center;gap:8px;position:fixed;top:0;left:0;right:0;z-index:999;overflow-x:auto}\n' +
'#tnav::-webkit-scrollbar{display:none}\n' +
'.tn-brand{font-size:13px;font-weight:700;color:#fff;margin-right:10px;white-space:nowrap;flex-shrink:0}\n' +
'.tn-btn{padding:4px 13px;border:1.5px solid #444;border-radius:20px;background:transparent;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}\n' +
'.tn-btn.active{background:#f5f4f0;border-color:#f5f4f0;color:#1a1a18;font-weight:600}\n' +
'#pframe{position:fixed;top:50px;left:0;right:0;bottom:0;border:none;width:100%;height:calc(100vh - 50px)}\n' +
'</style></head>\n' +
'<body>\n' +
'<div id="tnav"><span class="tn-brand">' + escapedBrand + '</span></div>\n' +
'<iframe id="pframe"></iframe>\n' +
'<script>\n' +
'(function(){\n' +
'  var pages=' + pagesJson + ';\n' +
'  var names=' + namesJson + ';\n' +
'  var nav=document.getElementById("tnav");\n' +
'  var frame=document.getElementById("pframe");\n' +
'  var btns=[];\n' +
'  var cur=0;\n' +
'  function showPage(i){\n' +
'    if(i<0||i>=pages.length)return;\n' +
'    cur=i;\n' +
'    btns.forEach(function(b,j){b.classList.toggle("active",j===i);});\n' +
'    // 用 blob URL 載入，讓 CSS/JS/字型全部正常\n' +
'    try{\n' +
'      var blob=new Blob([pages[i]],{type:"text/html;charset=utf-8"});\n' +
'      var url=URL.createObjectURL(blob);\n' +
'      if(frame._blobUrl)URL.revokeObjectURL(frame._blobUrl);\n' +
'      frame._blobUrl=url;\n' +
'      frame.src=url;\n' +
'    }catch(e){\n' +
'      frame.srcdoc=pages[i];\n' +
'    }\n' +
'  }\n' +
'  names.forEach(function(name,i){\n' +
'    var btn=document.createElement("button");\n' +
'    btn.className="tn-btn";btn.textContent=name;\n' +
'    btn.onclick=function(){showPage(i);};\n' +
'    btns.push(btn);nav.appendChild(btn);\n' +
'  });\n' +
'  window.addEventListener("message",function(e){\n' +
'    if(!e.data||e.data.type!=="navClick")return;\n' +
'    showPage(e.data.idx);\n' +
'  });\n' +
'  showPage(0);\n' +
'})();\n' +
'<\/script>\n' +
'</body></html>';\n' +
'}\n\n';
}

/* ── Build multi-page preview HTML wrapper ── */
function _buildPreviewHtml(pagesHtml, pageNames) {
  const brand = (state.navBrand||'默聲創意').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const pagesJson = JSON.stringify(pagesHtml);
  const namesJson = JSON.stringify(pageNames);
  return `<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${brand} · 網站設計預覽</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f4f0;margin:0}
#tnav{background:#1a1a18;padding:0 20px;height:50px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:999;overflow-x:auto}
#tnav::-webkit-scrollbar{display:none}
.tn-brand{font-size:13px;font-weight:700;color:#fff;margin-right:10px;white-space:nowrap;flex-shrink:0}
.tn-btn{padding:4px 13px;border:1.5px solid #444;border-radius:20px;background:transparent;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
.tn-btn.active{background:#f5f4f0;border-color:#f5f4f0;color:#1a1a18;font-weight:600}
#pcontent{width:100%;min-height:calc(100vh - 50px)}
</style>
</head>

<div id="tnav"><span class="tn-brand">${brand}</span></div>
<div id="pcontent"></div>
<script>
(function(){
  var pages = ${pagesJson};
  var names = ${namesJson};
  var nav=document.getElementById('tnav');
  var content=document.getElementById('pcontent');
  var btns=[];
  function showPage(i){
    btns.forEach(function(b,j){b.classList.toggle('active',j===i);});
    content.innerHTML=pages[i]||'';
    content.querySelectorAll('a,button').forEach(function(el){
      el.addEventListener('click',function(e){
        var href=el.getAttribute('href')||'';
        if(href.startsWith('http')||href.startsWith('mailto'))return;

  });

})();

/* ── Email: 自動寄信 + 下載備份 ── */
async function openEmailBrief() {
  const d = window._receiptData;
  if (!d) { alert('請先填寫並送出設計需求'); return; }

  const cfg = window.MC_CONFIG || {};
  const notifyEmail = cfg.notifyEmail || 'daviswang@morcept.com';
  const clientName  = cfg.clientName  || state.navBrand || '客戶';
  const pageList    = (state.pages||[]).map((p,i)=>`${i+1}. ${p.navItem||'未命名'}`).join('\n');

  /* ── 1. 下載預覽 HTML（客戶留存備份） ── */
  if (d.previewHtml) _downloadBlob(d.previewHtml, '默聲創意_網站設計預覽.html');

  /* ── 2. 下載需求確認單 HTML（客戶留存備份） ── */
  setTimeout(() => {
    const receiptHtml = _buildReceiptHtml(d);
    _downloadBlob(receiptHtml, '默聲創意_設計需求確認單.html');
  }, 400);

  /* ── 3. 自動寄信（透過 FormSubmit，免伺服器） ── */
  setTimeout(async () => {
    const submitBtn = document.querySelector('.e-submit-full');
    if (submitBtn) { submitBtn.textContent = '寄送中…'; submitBtn.disabled = true; }

    const emailBody = [
      `【設計需求確認單】${clientName} — ${d.styleName||''}`,
      '',
      `品牌名稱：${state.navBrand||'未填'}`,
      `聯絡電話：${state.contactPhone||'未填'}`,
      `Email：${state.contactEmail||'未填'}`,
      `選用風格：${d.styleName||''}`,
      `送出時間：${d.now||''}`,
      '',
      '── 主選單架構 ──',
      pageList,
      '',
      '── 配色 ──',
      `背景色：${(state.colors||{}).bg||'—'}`,
      `主色調：${(state.colors||{}).primary||'—'}`,
      `強調色：${(state.colors||{}).accent||'—'}`,
    ].join('\n');

    try {
      const formData = new FormData();
      formData.append('_to',      notifyEmail);
      formData.append('_subject', `【設計需求確認單】${clientName} — ${d.styleName||''}`);
      formData.append('_template','box');
      formData.append('_captcha', 'false');
      formData.append('客戶名稱',  clientName);
      formData.append('品牌名稱',  state.navBrand||'未填');
      formData.append('聯絡電話',  state.contactPhone||'未填');
      formData.append('Email',    state.contactEmail||'未填');
      formData.append('選用風格',  d.styleName||'');
      formData.append('送出時間',  d.now||'');
      formData.append('頁面架構',  pageList);
      formData.append('配色資訊',  `背景:${(state.colors||{}).bg||'—'} / 主色:${(state.colors||{}).primary||'—'} / 強調:${(state.colors||{}).accent||'—'}`);
      formData.append('message',  emailBody);

      const resp = await fetch(`https://formsubmit.co/${notifyEmail}`, {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: formData
      });

      if (resp.ok) {
        // 通知 Apps Script 標記此碼為已使用
        const scriptUrl = (window.MC_CONFIG||{}).appsScriptUrl;
        if (scriptUrl) {
          fetch(scriptUrl, {
            method: 'POST',
            body: JSON.stringify({ action: 'disable', code: (window.MC_CONFIG||{}).code || '' })
          }).catch(()=>{});
        }
        const submitArea = document.querySelector('.e-submit-area');
        if (submitArea) {
          submitArea.innerHTML = `
            <div style="padding:10px;background:#f0faf3;border:1.5px solid #86efac;border-radius:10px;text-align:center">
              <div style="font-size:13px;font-weight:700;color:#15803d;margin-bottom:4px">✅ 需求單已成功送出！</div>
              <div style="font-size:11px;color:#666">默聲創意將於 24 小時內與您聯繫</div>
              <div style="font-size:10px;color:#aaa;margin-top:6px">備份檔案已下載至您的電腦</div>
            </div>`;
        }
      } else {
        throw new Error('寄送失敗');
      }
    } catch(err) {
      // FormSubmit 失敗時備援：開 mailto
      console.warn('FormSubmit failed, fallback to mailto:', err);
      const subj = encodeURIComponent(`【設計需求確認單】${clientName} — ${d.styleName||''}`);
      const body = encodeURIComponent(emailBody);
      window.open(`mailto:${notifyEmail}?subject=${subj}&body=${body}`, '_blank');
      if (submitBtn) { submitBtn.textContent = '📩 下載檔案並寄出需求單'; submitBtn.disabled = false; }
    }
  }, 600);
}



// ══ ACTIVATION SYSTEM ════════════════════════════════════════════
(function() {
  const cfg = window.MC_CONFIG || {};
  const overlay = document.getElementById('act-overlay');
  const wrap    = document.getElementById('act-box-wrap');

  function lockFile() {
    // 把 used 標記寫回 MC_CONFIG，重新整理後仍顯示已使用
    window.MC_CONFIG.used = true;
  }

  function showUsed() {
    wrap.innerHTML = `
      <div class="act-used">
        <div class="act-used-icon">✅</div>
        <div class="act-used-title">設計需求已完成確認</div>
        <div class="act-used-desc">
          感謝您完成設計需求確認單。<br>
          請將剛才下載的兩個檔案寄送至以下信箱，確認內容後將由專人聯繫為您服務。<br><br>
          <a href="mailto:service@morcept.com" style="color:#c17f4a;font-weight:700;text-decoration:none">service@morcept.com</a>
        </div>
      </div>`;
    overlay.classList.remove('hidden');
  }

  function showLogin() {
    wrap.innerHTML = `
      <div class="act-box">
        <div class="act-logo">默聲<span>創意</span></div>
        <div class="act-sub">MORCEPT CREATIVE</div>
        <div class="act-title">請輸入啟用碼</div>
        <div class="act-desc">
          您好，${cfg.clientName || ''}！<br>
          請輸入專屬啟用碼以開始設計需求確認。
        </div>
        <input id="act-input" class="act-input" type="text" placeholder="例如：MC-8472" maxlength="20" autocomplete="off">
        <button class="act-btn" onclick="window._actSubmit()">進入設計工具</button>
        <div id="act-err" class="act-err"></div>
      </div>`;

    const inp = document.getElementById('act-input');
    inp.addEventListener('keydown', function(e){ if(e.key==='Enter') window._actSubmit(); });
    setTimeout(()=>{ inp.focus(); }, 100);
  }

  window._actSubmit = async function() {
    const inp  = document.getElementById('act-input');
    const val  = (inp.value || '').trim().toUpperCase();
    const btn  = document.querySelector('.act-btn');
    const errEl= document.getElementById('act-err');
    if (!val) return;

    // 先做本地碼比對
    const localCode = (cfg.code||'').toUpperCase();
    if (val !== localCode) {
      inp.classList.add('error');
      errEl.textContent = '啟用碼錯誤，請確認後再試一次。';
      setTimeout(()=>{ inp.classList.remove('error'); inp.value=''; inp.focus(); }, 600);
      return;
    }

    // 碼正確後，去 Sheets 確認是否仍有效
    if (btn) { btn.textContent = '驗證中…'; btn.disabled = true; }
    const url = cfg.appsScriptUrl;
    if (url) {
      try {
        const resp = await fetch(`${url}?code=${encodeURIComponent(val)}`);
        const data = await resp.json();
        if (!data.valid) {
          inp.classList.add('error');
          errEl.textContent = data.reason === 'disabled'
            ? '此啟用碼已停用，請聯繫默聲創意。'
            : '啟用碼已失效，請聯繫默聲創意。';
          setTimeout(()=>{ inp.classList.remove('error'); inp.value=''; inp.focus(); }, 600);
          if (btn) { btn.textContent = '進入設計工具'; btn.disabled = false; }
          return;
        }
      } catch(e) {
        // fetch 被擋（file:// 環境）→ 只靠本地碼，讓使用者進入
        console.warn('Sheets 驗證失敗（可能是 file:// 環境），使用本地驗證');
      }
    }
    // 通過
    overlay.classList.add('hidden');
    if (btn) { btn.textContent = '進入設計工具'; btn.disabled = false; }
  };

  if (cfg.used) { showUsed(); } else { showLogin(); }

  // 送出後鎖定：覆寫 openEmailBrief
  const _origOpenEmail = window.openEmailBrief;
  window.openEmailBrief = function() {
    if (typeof _origOpenEmail === 'function') _origOpenEmail();
    // 延遲鎖定（讓信件先開啟）
    setTimeout(function() {
      lockFile();
      showUsed();
    }, 1200);
  };
})();
